collection_date:
  allowed_range: '[2008-07-06, 2019-01-01]'
  description: the date on which the sample was collected; date/time ranges are supported
    by providing two dates from among the supported value formats, delimited by a
    forward-slash character; collection times are supported by adding "T", then the
    hour and minute after the date, and must be in Coordinated Universal Time (UTC),
    otherwise known as "Zulu Time" (Z); supported formats include "DD-Mmm-YYYY", "Mmm-YYYY",
    "YYYY" or ISO 8601 standard "YYYY-mm-dd", "YYYY-mm", "YYYY-mm-ddThh:mm:ss"; e.g.,
    30-Oct-1990, Oct-1990, 1990, 1990-10-30, 1990-10,  21-Oct-1952/15-Feb-1953, 2015-10-11T17:53:03Z;
